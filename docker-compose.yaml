name: my-mlb-passport

services:
  db:
    image: mysql:8.4
    container_name: mysql_db
    hostname: db
    environment:
      MYSQL_DATABASE: mlb_passport
      MYSQL_USER: mlb_user
      MYSQL_PASSWORD: mlb_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - ./database-files:/docker-entrypoint-initdb.d/:ro
      - db_data:/var/lib/mysql
    ports:
      - "3200:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build: ./api
    container_name: web-api
    hostname: web-api
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: mlb_passport
      MYSQL_USER: mlb_user
      MYSQL_PASSWORD: mlb_password
    volumes:
      - ./api:/apicode
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  app:
    build: ./app
    container_name: web-app
    hostname: web-app
    volumes:
      - ./app/src:/appcode
    ports:
      - "8501:8501"
    depends_on:
      - api

  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db_data: